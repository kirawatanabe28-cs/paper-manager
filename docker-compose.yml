name: paper-manager

services:
  grobid:
    image: grobid/grobid:0.9.0-crf
    init: true
    ulimits:
      core:
        soft: 0
        hard: 0
    ports:
      - "8070:8070"
    restart: unless-stopped

  backend:
    build: ./backend
    volumes:
      - ./data/db:/app/data
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/paper_manager.db
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - GROBID_URL=http://grobid:8070
    depends_on:
      - grobid
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
