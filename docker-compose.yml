name: paper-manager

services:
  backend:
    build: ./backend
    volumes:
      - ./data/db:/app/data
      - ./data/uploads:/app/uploads
    environment:
      - DATABASE_URL=sqlite:////app/data/paper_manager.db
      - UPLOAD_DIR=/app/uploads
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
